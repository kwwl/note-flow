<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteFlow — Notes de frais</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #22263a;
      --border: #2e3250;
      --accent: #5b6ef5;
      --accent-hover: #4a5ce0;
      --text: #e8eaf0;
      --text-muted: #7b82a0;
      --success: #2ecc71;
      --error: #e74c3c;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      width: 100%;
      max-width: 640px;
    }

    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { margin-top: 6px; color: var(--text-muted); font-size: 0.95rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 20px;
    }

    /* ── Auth ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface-2);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    .auth-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 11px 14px;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .auth-input:focus { border-color: var(--accent); }

    .auth-input::placeholder { color: var(--text-muted); }

    .auth-error {
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
    }

    /* ── User bar ── */
    #user-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 640px;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
    }

    #user-bar span { font-size: 0.9rem; color: var(--text-muted); }
    #user-bar strong { color: var(--text); }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-logout:hover { color: var(--error); border-color: var(--error); }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(91, 110, 245, 0.05);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .drop-zone p { color: var(--text-muted); font-size: 0.9rem; }
    .drop-zone p strong { color: var(--text); }

    #preview-container { display: none; margin-top: 16px; text-align: center; }

    #preview {
      max-width: 100%;
      max-height: 280px;
      border-radius: 8px;
      border: 1px solid var(--border);
      object-fit: contain;
    }

    #file-name { margin-top: 8px; font-size: 0.82rem; color: var(--text-muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 16px; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-reset {
      background: var(--surface-2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 640px;
      margin-top: 4px;
      display: none;
    }

    .btn-reset:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Loader ── */
    .loader {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .loader.htmx-request { display: flex; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #result { width: 100%; max-width: 640px; }

    /* ── Form fragment ── */
    .expense-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    .form-group label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .form-group input,
    .form-group select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); }
    .form-group select option { background: var(--surface-2); }

    .confidence-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-top: 4px;
    }

    .confidence-high   { background: rgba(46,204,113,0.15); color: #2ecc71; }
    .confidence-medium { background: rgba(241,196,15,0.15);  color: #f1c40f; }
    .confidence-low    { background: rgba(231,76,60,0.15);   color: #e74c3c; }

    .btn-submit {
      display: block;
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover { background: var(--accent-hover); }

    /* ── Success / Error ── */
    .result-success {
      background: var(--surface);
      border: 1px solid rgba(46,204,113,0.3);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
    }

    .success-message { font-size: 1.05rem; font-weight: 600; color: var(--success); margin-bottom: 16px; }

    .archived-img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      border: 1px solid var(--border);
      object-fit: contain;
      margin-top: 12px;
    }

    .result-error {
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: var(--radius);
      padding: 16px 20px;
      color: var(--error);
      font-size: 0.9rem;
    }

    /* ── Historique ── */
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .history-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .history-table th {
      text-align: left;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }

    .history-table td {
      padding: 8px 8px;
      border-bottom: 1px solid var(--surface-2);
      color: var(--text);
    }

    .history-table tr:last-child td { border-bottom: none; }
    .history-table a { color: var(--accent); text-decoration: none; }
    .text-muted { color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>

  <header>
    <h1>Note<span>Flow</span></h1>
    <p>Analysez vos justificatifs et synchronisez-les avec Google Sheets</p>
  </header>

  <!-- ── Section Auth (visible si non connecté) ── -->
  <div id="auth-section" class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Inscription</button>
    </div>

    <!-- Connexion -->
    <div id="login-form">
      <input class="auth-input" type="email" id="login-email" placeholder="Email" />
      <input class="auth-input" type="password" id="login-password" placeholder="Mot de passe" />
      <button class="btn btn-primary" onclick="handleLogin()">Se connecter</button>
    </div>

    <!-- Inscription -->
    <div id="signup-form" hidden>
      <input class="auth-input" type="text" id="signup-prenom" placeholder="Prénom" />
      <input class="auth-input" type="text" id="signup-nom" placeholder="Nom" />
      <input class="auth-input" type="email" id="signup-email" placeholder="Email" />
      <input class="auth-input" type="password" id="signup-password" placeholder="Mot de passe (min. 6 caractères)" />
      <button class="btn btn-primary" onclick="handleSignup()">Créer mon compte</button>
    </div>

    <p id="auth-error" class="auth-error"></p>
  </div>

  <!-- ── Application principale (visible si connecté) ── -->
  <div id="app-section" hidden>

    <!-- Barre utilisateur -->
    <div id="user-bar">
      <span>Connecté en tant que <strong id="user-display"></strong></span>
      <div style="display:flex;gap:8px;">
        <a href="/dashboard" class="btn-logout" style="text-decoration:none;">📊 Dashboard</a>
        <button class="btn-logout" onclick="handleLogout()">Déconnexion</button>
      </div>
    </div>

    <!-- Upload card -->
    <div class="card">
      <form
        id="upload-form"
        hx-post="/api/analyze"
        hx-target="#result"
        hx-swap="innerHTML"
        hx-encoding="multipart/form-data"
        hx-indicator="#loader"
      >
        <div class="drop-zone" id="drop-zone">
          <div class="icon">📄</div>
          <p><strong>Glissez une image ici</strong></p>
          <p>ou cliquez pour choisir un fichier</p>
          <input type="file" name="file" id="file-input" accept="image/jpeg,image/png,image/webp" capture="environment" />
        </div>

        <div id="preview-container">
          <img id="preview" alt="Prévisualisation" />
          <p id="file-name"></p>
        </div>

        <button type="submit" class="btn btn-primary" id="analyze-btn" disabled>
          Analyser la note de frais
        </button>
      </form>
    </div>

    <div id="loader" class="loader">
      <div class="spinner"></div>
      Analyse en cours…
    </div>

    <div id="result"></div>

    <button class="btn btn-reset" id="reset-btn" onclick="resetApp()">
      ↩ Nouvelle note de frais
    </button>

    <!-- Historique -->
    <div id="history-container" style="width:100%;max-width:640px;margin-top:20px;"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/static/app.js"></script>
</body>
</html>
