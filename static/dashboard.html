<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteFlow — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #22263a;
      --border: #2e3250;
      --accent: #5b6ef5;
      --accent-hover: #4a5ce0;
      --text: #e8eaf0;
      --text-muted: #7b82a0;
      --success: #2ecc71;
      --error: #e74c3c;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 80px;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    /* Header */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .top-bar h1 { font-size: 1.6rem; font-weight: 700; }
    .top-bar h1 span { color: var(--accent); }

    .nav-links { display: flex; gap: 12px; }

    .nav-link {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      padding: 8px 16px;
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-link:hover { color: var(--text); border-color: var(--accent); }

    /* User bar */
    #user-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      margin-bottom: 28px;
    }

    #user-bar span { font-size: 0.9rem; color: var(--text-muted); }
    #user-bar strong { color: var(--text); }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .btn-logout:hover { color: var(--error); border-color: var(--error); }

    /* KPI cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .kpi-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .kpi-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

    /* Charts */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .chart-card h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 20px;
    }

    /* Export PDF */
    .export-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .export-card label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .export-card input[type="month"] {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 0.9rem;
      outline: none;
    }

    .export-card input[type="month"]:focus { border-color: var(--accent); }

    .btn-export {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-export:hover { background: var(--accent-hover); }

    #auth-redirect {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div id="auth-redirect" hidden>
    <p>Vous devez être connecté. <a href="/" style="color: var(--accent)">Retour à l'accueil</a></p>
  </div>

  <div class="container" id="dashboard-content" hidden>

    <div class="top-bar">
      <h1>Note<span>Flow</span> — Dashboard</h1>
      <div class="nav-links">
        <a href="/" class="nav-link">← Soumettre une note</a>
      </div>
    </div>

    <div id="user-bar">
      <span>Connecté en tant que <strong id="user-display"></strong></span>
      <button class="btn-logout" onclick="handleLogout()">Déconnexion</button>
    </div>

    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Total ce mois</div>
        <div class="kpi-value" id="kpi-total">—</div>
        <div class="kpi-sub">€ TTC</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Notes de frais ce mois</div>
        <div class="kpi-value" id="kpi-count">—</div>
        <div class="kpi-sub">soumissions</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Dépenses des 6 derniers mois (€)</h3>
        <canvas id="chart-monthly"></canvas>
      </div>
      <div class="chart-card">
        <h3>Répartition par catégorie</h3>
        <canvas id="chart-category"></canvas>
      </div>
    </div>

    <!-- Export PDF -->
    <div class="export-card">
      <label>Exporter le récapitulatif PDF :</label>
      <input type="month" id="export-month" />
      <button class="btn-export" onclick="exportPDF()">Télécharger PDF</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    let supabaseClient = null;
    let currentSession = null;

    async function init() {
      const res = await fetch("/api/config");
      const { supabase_url, supabase_anon_key } = await res.json();
      supabaseClient = supabase.createClient(supabase_url, supabase_anon_key);

      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        document.getElementById("auth-redirect").hidden = false;
        return;
      }
      currentSession = session;

      // Affiche le nom
      const { data: profile } = await supabaseClient
        .from("profiles").select("nom, prenom").eq("id", session.user.id).maybeSingle();
      document.getElementById("user-display").textContent =
        profile ? `${profile.prenom} ${profile.nom}` : session.user.email;

      // Mois en cours par défaut
      const now = new Date();
      document.getElementById("export-month").value =
        `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;

      document.getElementById("dashboard-content").hidden = false;
      loadStats();
    }

    async function loadStats() {
      const res = await fetch("/api/dashboard/stats", {
        headers: { "Authorization": `Bearer ${currentSession.access_token}` }
      });
      if (!res.ok) return;
      const stats = await res.json();

      document.getElementById("kpi-total").textContent = stats.this_month_total.toFixed(2);
      document.getElementById("kpi-count").textContent = stats.this_month_count;

      // Graphique mensuel
      const labels = stats.monthly_totals.map(m => m.label);
      const totals = stats.monthly_totals.map(m => m.total);
      new Chart(document.getElementById("chart-monthly"), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "Total (€)",
            data: totals,
            backgroundColor: "rgba(91,110,245,0.7)",
            borderRadius: 6,
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#7b82a0" }, grid: { color: "#2e3250" } },
            y: { ticks: { color: "#7b82a0" }, grid: { color: "#2e3250" } }
          }
        }
      });

      // Graphique catégories
      const catLabels = stats.by_category.map(c => c.type);
      const catTotals = stats.by_category.map(c => c.total);
      const palette = ["#5b6ef5","#2ecc71","#f1c40f","#e74c3c","#9b59b6"];
      new Chart(document.getElementById("chart-category"), {
        type: "doughnut",
        data: {
          labels: catLabels,
          datasets: [{
            data: catTotals,
            backgroundColor: palette.slice(0, catLabels.length),
            borderWidth: 0,
          }]
        },
        options: {
          plugins: {
            legend: { labels: { color: "#e8eaf0", font: { size: 11 } } }
          }
        }
      });
    }

    async function exportPDF() {
      const month = document.getElementById("export-month").value;
      if (!month) return;
      const res = await fetch(`/api/export-pdf?month=${month}`, {
        headers: { "Authorization": `Bearer ${currentSession.access_token}` }
      });
      if (!res.ok) { alert("Erreur lors de la génération du PDF."); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `notes-frais-${month}.pdf`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function handleLogout() {
      await supabaseClient.auth.signOut();
      window.location.href = "/";
    }

    init();
  </script>
</body>
</html>
